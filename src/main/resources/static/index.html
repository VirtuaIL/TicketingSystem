<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketing System Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .navbar { background: #4f46e5; padding: 1rem 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background-color: #4f46e5; border: none; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .btn-primary:hover { background-color: #4338ca; transform: translateY(-1px); }
        .table { background: white; border-radius: 12px; overflow: hidden; }
        .badge-OPEN { background-color: #fef3c7; color: #92400e; padding: 0.5em 0.8em; }
        .badge-IN_PROGRESS { background-color: #dbeafe; color: #1e40af; padding: 0.5em 0.8em; }
        .badge-DONE { background-color: #d1fae5; color: #065f46; padding: 0.5em 0.8em; }
        .badge-CANCELED { background-color: #fee2e2; color: #991b1b; padding: 0.5em 0.8em; }
        .form-select-sm { border-radius: 8px; border: 1px solid #d1d5db; cursor: pointer; }
        .ticket-title { font-size: 1.05rem; color: #111827; }
        .timestamp { font-size: 0.85rem; color: #6b7280; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <span class="navbar-brand mb-0 h1">System Obsługi Zgłoszeń</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-4 mb-4">
            <div class="card p-4">
                <h5 class="mb-4 fw-bold">Nowe Zgłoszenie</h5>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-uppercase text-muted">Tytuł problemu</label>
                    <input type="text" id="title" class="form-control bg-light border-0" placeholder="np. Awaria drukarki">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-uppercase text-muted">Szczegółowy opis</label>
                    <textarea id="description" class="form-control bg-light border-0" rows="3" placeholder="Opisz co się stało..."></textarea>
                </div>
                <button onclick="addTicket()" class="btn btn-primary w-100 py-3 mt-2">Stwórz zgłoszenie</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="mb-0 fw-bold">Wszystkie Bilety</h5>
                    <span class="badge bg-secondary rounded-pill" id="ticketCount">0</span>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="text-muted small text-uppercase">
                        <tr>
                            <th>ID</th>
                            <th>Informacje</th>
                            <th>Utworzono</th>
                            <th>Status</th>
                            <th class="text-end">Akcja</th>
                        </tr>
                        </thead>
                        <tbody id="ticketList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = '/api/tickets';

    async function loadTickets() {
        try {
            const response = await fetch(API_URL);
            const tickets = await response.json();
            const list = document.getElementById('ticketList');
            document.getElementById('ticketCount').innerText = tickets.length;
            list.innerHTML = '';

            tickets.sort((a, b) => b.id - a.id).forEach(t => {
                const rawDate = t.createTime || '';
                const formattedDate = rawDate.replace('T', ' ').substring(0, 16);

                list.innerHTML += `
                    <tr>
                        <td class="text-muted fw-bold small">#${t.id}</td>
                        <td>
                            <div class="ticket-title fw-semibold">${t.title}</div>
                            <div class="small text-muted text-truncate" style="max-width: 200px;">${t.description || 'Brak opisu'}</div>
                        </td>
                        <td class="timestamp">${formattedDate}</td>
                        <td>
                            <span class="badge badge-${t.status} rounded-pill">${t.status}</span>
                        </td>
                        <td class="text-end">
                            <select class="form-select form-select-sm"
                                    onchange="updateStatus(${t.id}, this.value)">
                                <option value="" disabled selected>Zmień stan...</option>
                                <option value="OPEN">Otwarty (OPEN)</option>
                                <option value="IN_PROGRESS">W toku (IN_PROGRESS)</option>
                                <option value="DONE">Zrobiony (DONE)</option>
                                <option value="CANCELED">Anulowany (CANCELED)</option>
                            </select>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Błąd ładowania:", error);
        }
    }

    async function addTicket() {
        const titleInput = document.getElementById('title');
        const descInput = document.getElementById('description');

        if(!titleInput.value.trim()) return alert("Tytuł jest wymagany!");

        const ticketData = {
            title: titleInput.value,
            description: descInput.value
        };

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ticketData)
        });

        titleInput.value = '';
        descInput.value = '';
        loadTickets();
    }

    async function updateStatus(id, status) {
        await fetch(`${API_URL}/${id}/status?newStatus=${status}`, {
            method: 'PATCH'
        });
        loadTickets();
    }

    loadTickets();
</script>
</body>
</html>
